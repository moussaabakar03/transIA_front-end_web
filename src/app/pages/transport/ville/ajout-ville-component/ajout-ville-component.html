<div class="ville-form-page">
  <div class="d-flex align-items-center justify-content-between mb-4 page-head">
    <div>
      <h4 class="mb-1 fw-bold">Ajouter une ville</h4>
      <p class="text-muted mb-0">Renseignez les informations nécessaires pour enregistrer une nouvelle ville.</p>
    </div>
    <button type="button" class="btn btn-soft-secondary" (click)="cancel()">
      Retour à la liste
    </button>
  </div>

  <!-- Chargement -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Chargement des données...</p>
  </div>

  <div *ngIf="!isLoading" class="row g-4">
    <div class="col-lg-8">
      <div class="card form-card">
        <div class="card-body">
          <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
            {{ errorMessage }}
          </div>

          <div *ngIf="successMessage" class="alert alert-success" role="alert">
            {{ successMessage }}
          </div>

          <form novalidate>
            <div class="row g-3">

              <!-- Nom de la ville -->
              <div class="col-md-12">
                <label class="form-label" for="nomVille">Nom de la ville</label>
                <input
                  id="nomVille"
                  name="nomVille"
                  type="text"
                  class="form-control"
                  [(ngModel)]="villeForm.nomVille"
                  [disabled]="isSubmitting"
                  placeholder="Ex: Dakar"
                />
              </div>

              <!-- Région -->
              <div class="col-md-12">
                <label class="form-label" for="region">Région</label>
                <select
                  id="region"
                  name="region"
                  class="form-select"
                  [(ngModel)]="villeForm.region"
                  [disabled]="isSubmitting"
                >
                  <option value="">-- Sélectionner une région --</option>
                  <option *ngFor="let region of regionOptions" [value]="region">
                    {{ region }}
                  </option>
                </select>
              </div>

            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Colonne droite : aperçu -->
    <div class="col-lg-4">
      <div class="card form-card">
        <div class="card-body">
          <p class="text-muted text-sm mb-3">
            <i class="las la-info-circle me-2"></i>Aperçu en direct
          </p>
          <div class="preview-box">
            <div class="preview-item">
              <div class="preview-icon">
                <i class="las la-map-marked-alt"></i>
              </div>
              <div class="preview-content">
                <div class="preview-label">Ville</div>
                <div class="preview-value">
                  {{ villeForm.nomVille || 'Nom de la ville' }}
                </div>
              </div>
            </div>
            <div class="preview-item mt-3">
              <div class="preview-icon">
                <i class="las la-globe-africa"></i>
              </div>
              <div class="preview-content">
                <div class="preview-label">Région</div>
                <div class="preview-value">
                  {{ villeForm.region || 'Région' }}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Boutons d'action -->
  <div class="row g-4 mt-4">
    <div class="col-lg-8">
      <div class="d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-light" (click)="cancel()">
          Annuler
        </button>
        <button type="button" class="btn btn-primary" (click)="submit()" [disabled]="isSubmitting">
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status"></span>
          <i *ngIf="!isSubmitting" class="las la-save me-1"></i>
          {{ isSubmitting ? 'Enregistrement...' : 'Enregistrer' }}
        </button>
      </div>
    </div>
  </div>

</div>
